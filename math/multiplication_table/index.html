<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tafels werkblad · Training</title>
  <style>
    :root {
      --bg:           #f1f5f9;
      --surface:      #ffffff;
      --primary:      #3b82f6;
      --primary-soft: #eff6ff;
      --success:      #16a34a;
      --success-soft: #dcfce7;
      --error:        #dc2626;
      --error-soft:   #fee2e2;
      --text:         #0f172a;
      --text-muted:   #64748b;
      --border:       #e2e8f0;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:    0 4px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      --r-lg:         20px;
      --r-md:         12px;
      --r-sm:          8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 18px;
      text-align: center;
    }

    /* ── Setup screen ─────────────────────────────────────────────────── */
    #setup {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      padding: 24px;
    }

    #setup p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .number-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .number-btn {
      aspect-ratio: 1;
      border: 2px solid var(--border);
      background: var(--surface);
      border-radius: var(--r-md);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all .15s ease;
    }

    .number-btn:hover {
      border-color: var(--primary);
    }

    .number-btn.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .start-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--r-md);
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s ease;
    }

    .start-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* ── Test screen ──────────────────────────────────────────────────── */
    #test {
      display: none;
      width: 100%;
      max-width: 1100px;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 18px;
    }

    .timer {
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      border-radius: 99px;
      padding: 8px 22px;
      font-size: 20px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--primary);
    }

    .blocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .block {
      background: var(--surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .exercise {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      font-weight: 600;
      padding: 6px 0;
      border-radius: var(--r-sm);
    }

    .exercise input {
      width: 56px;
      padding: 6px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: var(--r-sm);
      font-family: inherit;
    }

    .exercise input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .exercise.correct {
      background: var(--success-soft);
    }

    .exercise.correct input {
      border-color: var(--success);
      color: var(--success);
    }

    .exercise.incorrect {
      background: var(--error-soft);
    }

    .exercise.incorrect input {
      border-color: var(--error);
      color: var(--error);
    }

    .exercise .answer-hint {
      font-weight: 800;
      color: var(--success);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Bottom controls / stats ─────────────────────────────────────── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .action-btn {
      padding: 14px 40px;
      border: none;
      border-radius: var(--r-md);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
    }

    .action-btn.finish {
      background: var(--primary);
    }

    .action-btn.restart {
      background: var(--success);
      display: none;
    }

    .stats {
      display: none;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      border-radius: var(--r-md);
      padding: 16px 24px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
    }

    .stats .stat-line {
      margin: 4px 0;
    }

    .stats .stat-success { color: var(--success); }
    .stats .stat-error { color: var(--error); }

    /* ── Results popup ────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px);
      z-index: 100;
      padding: 24px 16px;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: auto;
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      padding: 28px 24px;
      text-align: center;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: none;
      border-radius: 50%;
      color: var(--text-muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .modal-close:hover {
      background: var(--error-soft);
      color: var(--error);
    }

    .modal-card h2 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .modal-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .summary-tile {
      background: var(--bg);
      border-radius: var(--r-md);
      padding: 14px 8px;
    }

    .summary-tile .value {
      font-size: 26px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .summary-tile .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .summary-tile.good .value { color: var(--success); }
    .summary-tile.bad .value { color: var(--error); }

    .mistakes {
      text-align: left;
      margin-bottom: 24px;
    }

    .mistakes h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .mistake-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--r-sm);
      background: var(--error-soft);
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .mistake-row .given {
      color: var(--error);
      text-decoration: line-through;
      font-weight: 700;
    }

    .mistake-row .given.empty {
      text-decoration: none;
      font-style: italic;
      opacity: .7;
    }

    .mistake-row .right {
      color: var(--success);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .all-good {
      color: var(--success);
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .modal-actions .action-btn {
      display: inline-block;
    }

    .action-btn.review {
      background: var(--text-muted);
    }

    /* ── Topbar navigation ─────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .topbar__inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topbar__brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 17px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .topbar__brand .logo { font-size: 22px; }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--r-sm);
      color: var(--text);
    }

    .nav-toggle svg { display: block; }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }

    .nav-item { position: relative; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: var(--r-sm);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .nav-link:hover { background: var(--primary-soft); color: var(--primary); }
    .nav-link.active { color: var(--primary); background: var(--primary-soft); }
    .nav-link .caret { font-size: 10px; transition: transform .2s; }

    .nav-menu__sub {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 190px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-md);
      padding: 6px;
      list-style: none;
      display: none;
    }

    .nav-dropdown.open > .nav-menu__sub { display: block; }
    .nav-dropdown.open .caret { transform: rotate(180deg); }
    .nav-menu__sub .nav-link { color: var(--text); width: 100%; }

    @media (min-width: 721px) {
      .nav-dropdown:hover > .nav-menu__sub { display: block; }
      .nav-dropdown:hover .caret { transform: rotate(180deg); }
    }

    @media (max-width: 720px) {
      .nav-toggle { display: inline-flex; }
      .nav-menu {
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        flex-direction: column;
        align-items: stretch;
        gap: 2px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow-md);
        padding: 10px 12px 16px;
        display: none;
      }
      .nav-menu.open { display: flex; }
      .nav-link { padding: 12px 14px; font-size: 16px; }
      .nav-menu__sub {
        position: static;
        box-shadow: none;
        border: none;
        padding: 2px 0 2px 14px;
        min-width: 0;
      }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="topbar__inner">
      <a class="topbar__brand" href="../../index.html">
        <span class="logo">📚</span> School
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li class="nav-item"><a class="nav-link" href="../../index.html">🏠 Home</a></li>
        <li class="nav-item nav-dropdown" id="mathDrop">
          <button class="nav-link" id="mathDropBtn" aria-expanded="false">🧮 Math <span class="caret">▾</span></button>
          <ul class="nav-menu__sub">
            <li><a class="nav-link" href="../../math/group3/index.html">🔢 Group 3</a></li>
            <li><a class="nav-link" href="../../math/group4/index.html">🔢 Group 4</a></li>
            <li><a class="nav-link" href="../../math/group5/index.html">🔢 Group 5</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link active" href="../../math/multiplication_table/index.html">✖️ Multiplication Table</a></li>
      </ul>
    </div>
  </nav>

  <main class="page">
  <h1>Tafels werkblad · Training</h1>

  <div id="setup">
    <p>Kies de tafel(s) waarmee je wilt oefenen (1-10):</p>
    <div class="number-grid" id="numberGrid"></div>
    <button class="start-btn" id="startBtn" disabled>Start</button>
  </div>

  <div id="test">
    <div class="top-bar">
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="blocks-grid" id="blocksGrid"></div>
    <div class="controls">
      <button class="action-btn finish" id="finishBtn">Finish</button>
      <button class="action-btn restart" id="restartBtn">Restart</button>
      <div class="stats" id="stats"></div>
    </div>
  </div>

  </main>

  <div class="modal-overlay" id="resultModal">
    <div class="modal-card">
      <button class="modal-close" id="modalCloseBtn" aria-label="Sluiten">&times;</button>
      <h2>Resultaten</h2>
      <div class="modal-summary">
        <div class="summary-tile good">
          <div class="value" id="mGood">0</div>
          <div class="label">Goed</div>
        </div>
        <div class="summary-tile bad">
          <div class="value" id="mBad">0</div>
          <div class="label">Fout</div>
        </div>
        <div class="summary-tile">
          <div class="value" id="mTime">00:00</div>
          <div class="label">Tijd</div>
        </div>
      </div>
      <div class="mistakes" id="mistakesList"></div>
      <div class="modal-actions">
        <button class="action-btn review" id="reviewBtn">Bekijk werkblad</button>
        <button class="action-btn restart" id="modalRestartBtn" style="display:inline-block">Opnieuw</button>
      </div>
    </div>
  </div>

  <script>
    /* ── Topbar interactions ────────────────────────────────────────────── */
    (function () {
      const toggle = document.getElementById('navToggle');
      const menu = document.getElementById('navMenu');
      const drop = document.getElementById('mathDrop');
      const dropBtn = document.getElementById('mathDropBtn');

      toggle.addEventListener('click', () => {
        const open = menu.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });

      dropBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = drop.classList.toggle('open');
        dropBtn.setAttribute('aria-expanded', open);
      });

      document.addEventListener('click', (e) => {
        if (!drop.contains(e.target)) drop.classList.remove('open');
      });
    })();

    const numberGrid = document.getElementById('numberGrid');
    const startBtn = document.getElementById('startBtn');
    const setupView = document.getElementById('setup');
    const testView = document.getElementById('test');
    const blocksGrid = document.getElementById('blocksGrid');
    const finishBtn = document.getElementById('finishBtn');
    const restartBtn = document.getElementById('restartBtn');
    const statsEl = document.getElementById('stats');
    const timerEl = document.getElementById('timer');
    const resultModal = document.getElementById('resultModal');
    const mGood = document.getElementById('mGood');
    const mBad = document.getElementById('mBad');
    const mTime = document.getElementById('mTime');
    const mistakesList = document.getElementById('mistakesList');
    const reviewBtn = document.getElementById('reviewBtn');
    const modalRestartBtn = document.getElementById('modalRestartBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    const BLOCK_COUNT = 9;
    const ROWS_PER_BLOCK = 5;

    let selectedNumbers = new Set();
    let timerInterval = null;
    let startTime = null;
    let exercises = [];

    // Build number picker 1-10
    for (let n = 1; n <= 10; n++) {
      const btn = document.createElement('button');
      btn.className = 'number-btn';
      btn.textContent = n;
      btn.addEventListener('click', () => {
        btn.classList.toggle('selected');
        if (selectedNumbers.has(n)) {
          selectedNumbers.delete(n);
        } else {
          selectedNumbers.add(n);
        }
        startBtn.disabled = selectedNumbers.size === 0;
      });
      numberGrid.appendChild(btn);
    }

    startBtn.addEventListener('click', startTest);
    finishBtn.addEventListener('click', finishTest);
    restartBtn.addEventListener('click', restartTest);
    modalRestartBtn.addEventListener('click', restartTest);
    reviewBtn.addEventListener('click', () => resultModal.classList.remove('open'));
    modalCloseBtn.addEventListener('click', () => resultModal.classList.remove('open'));

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickFrom(arr) {
      return arr[randomInt(0, arr.length - 1)];
    }

    function generateExercises() {
      const numbers = Array.from(selectedNumbers);
      const list = [];
      for (let i = 0; i < BLOCK_COUNT * ROWS_PER_BLOCK; i++) {
        const tableNumber = pickFrom(numbers);
        const multiplier = randomInt(1, 10);
        const swapped = Math.random() < 0.5;
        const left = swapped ? multiplier : tableNumber;
        const right = swapped ? tableNumber : multiplier;
        list.push({
          left,
          right,
          answer: tableNumber * multiplier
        });
      }
      return list;
    }

    function renderExercises() {
      blocksGrid.innerHTML = '';
      for (let b = 0; b < BLOCK_COUNT; b++) {
        const block = document.createElement('div');
        block.className = 'block';
        for (let r = 0; r < ROWS_PER_BLOCK; r++) {
          const ex = exercises[b * ROWS_PER_BLOCK + r];
          const row = document.createElement('div');
          row.className = 'exercise';

          const label = document.createElement('span');
          label.textContent = `${ex.left} x ${ex.right} =`;

          const input = document.createElement('input');
          input.type = 'text';
          input.inputMode = 'numeric';
          input.dataset.answer = ex.answer;
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              const allInputs = Array.from(document.querySelectorAll('.exercise input'));
              const idx = allInputs.indexOf(input);
              const next = allInputs[idx + 1];
              if (next) next.focus();
            }
          });

          row.appendChild(label);
          row.appendChild(input);
          block.appendChild(row);
        }
        blocksGrid.appendChild(block);
      }
    }

    function startTest() {
      exercises = generateExercises();
      renderExercises();

      setupView.style.display = 'none';
      testView.style.display = 'block';
      finishBtn.style.display = 'inline-block';
      restartBtn.style.display = 'none';
      statsEl.style.display = 'none';

      startTime = Date.now();
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = formatTime(elapsed);
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const seconds = (totalSeconds % 60).toString().padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function finishTest() {
      clearInterval(timerInterval);
      const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = formatTime(elapsedSeconds);

      let correctCount = 0;
      let incorrectCount = 0;
      const mistakes = [];

      document.querySelectorAll('.exercise').forEach(row => {
        const input = row.querySelector('input');
        const correctAnswer = Number(input.dataset.answer);
        const rawValue = input.value.trim();
        const userAnswer = Number(rawValue);
        const isCorrect = rawValue !== '' && userAnswer === correctAnswer;

        row.classList.remove('correct', 'incorrect');
        const oldHint = row.querySelector('.answer-hint');
        if (oldHint) oldHint.remove();

        if (isCorrect) {
          row.classList.add('correct');
          correctCount++;
        } else {
          row.classList.add('incorrect');
          incorrectCount++;

          // Show the right answer to the right side of the input
          const hint = document.createElement('span');
          hint.className = 'answer-hint';
          hint.textContent = `→ ${correctAnswer}`;
          input.insertAdjacentElement('afterend', hint);

          mistakes.push({
            label: row.querySelector('span').textContent,
            given: rawValue,
            answer: correctAnswer
          });
        }
        input.disabled = true;
      });

      finishBtn.style.display = 'none';
      restartBtn.style.display = 'inline-block';

      statsEl.style.display = 'block';
      statsEl.innerHTML = `
        <div class="stat-line stat-success">Goed: ${correctCount}</div>
        <div class="stat-line stat-error">Fout: ${incorrectCount}</div>
        <div class="stat-line">Tijd: ${formatTime(elapsedSeconds)}</div>
      `;

      showResultModal(correctCount, incorrectCount, elapsedSeconds, mistakes);
    }

    function showResultModal(correctCount, incorrectCount, elapsedSeconds, mistakes) {
      mGood.textContent = correctCount;
      mBad.textContent = incorrectCount;
      mTime.textContent = formatTime(elapsedSeconds);

      if (mistakes.length === 0) {
        mistakesList.innerHTML = '<div class="all-good">Alles goed! 🎉</div>';
      } else {
        const rows = mistakes.map(m => {
          const given = m.given === ''
            ? '<span class="given empty">leeg</span>'
            : `<span class="given">${m.given}</span>`;
          return `
            <div class="mistake-row">
              <span>${m.label} ${given}</span>
              <span class="right">${m.answer}</span>
            </div>`;
        }).join('');
        mistakesList.innerHTML = `<h3>Fouten (${mistakes.length})</h3>${rows}`;
      }

      resultModal.classList.add('open');
    }

    function restartTest() {
      clearInterval(timerInterval);
      timerEl.textContent = '00:00';
      statsEl.style.display = 'none';
      resultModal.classList.remove('open');
      blocksGrid.innerHTML = '';
      testView.style.display = 'none';
      setupView.style.display = 'block';
    }
  </script>
</body>
</html>
